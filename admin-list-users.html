<body>
    <header>
        <div class="imgLogo"><img src="images/logo.svg" alt="Hustle Logo"></div>
        <nav>
            <ul class="hLeft-container">
                <li><a href="">Gig Progress</a></li>

    <div class="content-container">
        <!-- Search Bar & Filter -->        
        <div class="search-filter-container">
            <form onsubmit="event.preventDefault();">
                <div class="search-section">
                    <label for="searchUser" class="accessibility">Username</label>
                    <input type="search" id="searchUser" placeholder="Search by username...">
                </div>
                <div class="filter-section">
                    <label for="filterRole" class="accessibility">Role</label>
                    <select id="filterRole" name="filterRole">
                        <option value="" disabled selected>Role</option>
                        <option value="Gig Worker">Gig Worker</option>
                        <option value="Gig Owner">Gig Owner</option>
                    </select>
                </div>
                <button type="submit">Search</button>
            </form>
        </div>
        <!-- List of User -->
        <div class="list-container">
            <ul class="user-list">
                <li class="item-container">
                    <a href="">
                    <div class="user-left">
                        <div class="user-img"><img src="" alt="Icon User"></div>
                        <div class="user-info">
                            <p class="user-name">Username</p>                           
                        </div>
                    </div>
                    <div class="user-right">
                        <p class="user-filter">Role</p>
                    </div>
                    </a>
                </li>

                <!-- List Bawah Akan Dibuang Kemudian -->
                <li class="item-container">
                    <a href="">
                    <div class="user-left">
                        <div class="user-img"><img src="" alt="Icon User"></div>

                            <p class="user-name">Username</p>                           
                        </div>
                    </div>

                        <p class="user-filter">Role</p>
                    </div>
                    </a>
                </li>
                <li class="item-container">

                            <p class="user-name">Username</p>                           
                        </div>
                    </div>
                    <div class="user-right">
                        <p class="user-filter">Role</p>
                    </div>
                    </a>
                </li>
                <li class="item-container">
                    <a href="">
                    <div class="user-left">
                        <div class="user-img"><img src="" alt="Icon User"></div>
                        <div class="user-info">
                            <p class="user-name">Username</p>                           
                        </div>
                    </div>
                    <div class="user-right">
                        <p class="user-filter">Role</p>
                    </div>
                    </a>
                </li>

        </div>
