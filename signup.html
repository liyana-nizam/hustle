<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
    <link rel="stylesheet" href="signup-style.css">

    <style>@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');</style>

</head>

<body id="backgroundColor">

    <header>
    <div class="imgLogo"><img src="images/logo.svg" alt="Hustle Logo"></div>
    </header>

    <div id="formGroup">

        <div class="imgIcon">
            <img src="images/iconuser.png" alt="User Icon">  
        </div>

        <h1>Sign up Hustle</h1>

        <form onsubmit="event.preventDefault(); showData();">

            <div class="formSection">
                <label>Create username</label>
                <input type="text" id="usernameInput" required placeholder="e.g. amelia123">
            </div>

            <div class="formSection">
                <label>Password</label>
                <input type="password" id="passwordInput" required oninput="clearPasswordError()">
            </div>

            <div class="formSection">
                <label>Confirm Password</label>
                <input type="password" id="confirmPasswordInput" required oninput="clearPasswordError()">
                <p id="passwordError" class="error"></p>
            </div>

            <div class="formRole">
                <label for="userType">Role</label>
                <div class="roleOptions">
                    <input type="radio" name="role" id="role" value="gigworker" required>Gig Worker
                    <input type="radio" name="role" id="role" value="serviceprovider" required>Service Provider
                </div>
            </div>

            <div class="formSection">
                <label>Full name</label>
                <input type="text" id="nameInput" required placeholder="e.g. Amelia Henderson">
            </div>

            <div class="formSection">
                <label>Birthday</label>
                <input type="date" id="birthdayInput" required>
            </div>

            <div class="formRole">
              <label>Gender</label>
              <div class="roleOptions">
                <input type="radio" name="gender" id="male" value="male" required>Male
                <input type="radio" name="gender" id="female" value="female" required>Female
              </div>
            </div>

            <div class="formSection">
                <label>Full address</label>
                <input type="text" id="addressInput" required>
            </div>

            <div class="formSection">
                <label>Phone number</label>
                <input type="tel" id="phoneInput" required placeholder="e.g. +0123456789">
            </div>

            <button type="submit">Sign In</button>
            <h2>Already have an account? <a href="login.html">Log In</a></h2>

        </form>

    </div>

    <div id="main" class="hidden">

        <p id="Username"></p>
        <p id="password"></p>`
        <p id="confirmPassword"></p>
        <p id="role"></p>
        <p id="fullName"></p>
        <p id="birthday"></p>
        <p id="gender"></p>
        <p id="fullAddress"></p>
        <p id="phone"></p>   

    </div>
    
    <script>

        function clearPasswordError() {
            document.getElementById("passwordError").innerHTML = "";
        }

        function showData() 
        {
            clearPasswordError();

            let username = document.getElementById("usernameInput").value;
            let password = document.getElementById("passwordInput").value;
            let confirmPassword = document.getElementById("confirmPasswordInput").value;
            let role = document.querySelector('input[name="role"]:checked');
            let fullName = document.getElementById("nameInput").value;
            let birthday = document.getElementById("birthdayInput").value;
            let gender = document.querySelector('input[name="gender"]:checked');
            let fullAddress = document.getElementById("addressInput").value;
            let phone = document.getElementById("phoneInput").value;

            /*document.getElementById("Username").innerHTML = "Username: " + username;
            document.getElementById("password").innerHTML = "Password: " + password;
            document.getElementById("confirmPassword").innerHTML = "Confirm Password: " + confirmPassword;
            document.getElementById("role").innerHTML = "Role: " + role;
            document.getElementById("fullName").innerHTML = "Full Name: " + fullName;
            document.getElementById("birthday").innerHTML = "Birthday: " + birthday;
            document.getElementById("gender").innerHTML = "Gender: " + gender;
            document.getElementById("fullAddress").innerHTML = "Full Address: " + fullAddress;
            document.getElementById("phone").innerHTML = "Phone Number: " + phone;*/

            // JavaScript Validation
            if (password != confirmPassword) {
                document.getElementById("passwordError").innerHTML = "Passwords do not match";
                return; 
            }

            document.getElementById("main").classList.remove("hidden");
        }

    </script>
    
</body>
</html>
