<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
    <link rel="stylesheet" href="signup-style.css"> 

    <style>@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');</style>

</head>

<body id="backgroundColor">

    <header>
    <div class="imgLogo"><img src="images/logo.svg" alt="Hustle Logo"></div>
    </header>

    <div id="formGroup">

        <div class="imgIcon">
            <img src="images/iconuser.png" alt="User Icon">  
        </div>

        <h1>Sign up Hustle</h1>

        <form onsubmit="event.preventDefault(); showData();">

            <div class="formSection">
                <label>Create username</label>
                <input type="text" id="usernameInput" required placeholder="e.g. amelia123">
            </div>

            <div class="formSection">
                <label>Password</label>
                <input type="password" id="passwordInput" required>
            </div>

            <div class="formSection">
                <label>Confirm Password</label>
                <input type="password" id="confirmPasswordInput" required>
            </div>

            <div class="formRole">
                <label for="userType">Role</label>
                <div class="roleOptions">
                    <label><input type="radio" name="role" id="role" value="gigworker">Gig Worker</label>
                    <label><input type="radio" name="role" id="role" value="serviceprovider">Service Provider</label>
                </div> 
            </div>

            <button type="submit">Next</button>
            <h2>Already have an account? <a href="login.html">Log In</a></h2>

        </form>

    </div>

    <div id="main" class="hidden">

        <p id="Username"></p>
        <p id="password"></p>`
        <p id="confirmPassword"></p>
        <p id="role"></p>   

    </div>
    
    <script>

        function showData() 
        {
            let username = document.getElementById("usernameInput").value;
            let password = document.getElementById("passwordInput").value;
            let confirmPassword = document.getElementById("confirmPasswordInput").value;
            let role = document.getElementById("userType").value;

            /*document.getElementById("Username").innerHTML = "Username: " + username;
            document.getElementById("password").innerHTML = "Password: " + password;
            document.getElementById("confirmPassword").innerHTML = "Confirm Password: " + confirmPassword;
            document.getElementById("role").innerHTML = "Role: " + role;*/

            document.getElementById("main").classList.remove("hidden");
            window.location.href = "personal.html";
        }

    </script>
    
</body>
</html>
