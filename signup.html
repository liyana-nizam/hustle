<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="signup-style.css"> 

    <style>@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap');</style>

</head>

<body id="backgroundColor">

    <header>
    <div class="imgLogo"><img src="images/logo.svg" alt="Hustle Logo"></div>
    </header>

    <div id="formGroup">

        <div class="imgIcon">
            <img src="images/iconuser.png" alt="User Icon">  
        </div>

        <h1>Sign up Hustle</h1>

        <form onsubmit="event.preventDefault(); showData();">

            <div class="formSection">
                <label>Full name</label>
                <input type="text" id="nameInput" required placeholder="e.g. Amelia Henderson">
            </div>

            <div class="formSection">
                <label>Phone number</label>
                <input type="number" id="numberInput" required>
            </div>

            <div class="formSection">
                <label>Address</label>
                <input type="text" id="addressInput" required>
            </div>

            <div class="formSection">
                <label>City</label>
                <input type="text" id="cityInput" required>
            </div>

            <div class="formSection">
                <label>Postcode</label>
                <input type="number" id="postcodeInput" required>
            </div>

            <div class="formSection">
                <label>State</label>
                <input type="text" id="stateInput" required>
            </div>

            <div class="formSection">
                <label>Describe yourself</label>
                <input type="text" id="describeInput" required >
            </div>

            <button type="submit">Sign Up</button>
            <h2>Already have an account? <a href="login.html">Log In</a></h2>

        </form>

    </div>

    <div id="main" class="hidden">

        <p id="fullName"></p>
        <p id="phoneNo"></p>
        <p id="address"></p>
        <p id="city"></p>   
        <p id="postcode"></p>
        <p id="state"></p>
        <p id="describe"></p>

    </div>
    
    <script>

        function showData() 
        {
            let fullName = document.getElementById("nameInput").value;
            let phoneNo = document.getElementById("numberInput").value;
            let address = document.getElementById("addressInput").value;
            let city = document.getElementById("cityInput").value;
            let postcode = document.getElementById("postcodeInput").value;
            let state = document.getElementById("stateInput").value;
            let describe = document.getElementById("describeInput").value;

            /*document.getElementById("fullName").innerHTML = "Full Name: " + fullName;
            document.getElementById("phoneNo").innerHTML = "Phone Number: " + phoneNo;
            document.getElementById("address").innerHTML = "Address: " + address;
            document.getElementById("city").innerHTML = "City: " + city;
            document.getElementById("postcode").innerHTML = "Postcode: " + postcode;
            document.getElementById("state").innerHTML = "State: " + state;
            document.getElementById("describe").innerHTML = "Describe Yourself: " + describe;*/

            document.getElementById("main").classList.remove("hidden");
        }

    </script>
    
</body>
</html>
